<!DOCTYPE html>
<html>
<head>
    <title>Wordie - Stats</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <style>
        :root {
            --bg: white;
            --text: black;
            --border: #D6D9DD;
            --stat-bg: #E3E3E1;
            --stat-text: black;
        }
        [data-theme="dark"] {
            --bg: #1a1a1b;
            --text: white;
            --border: #3a3a3c;
            --stat-bg: #2a2a2b;
            --stat-text: white;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'American Typewriter';
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 5px;
        }
        .username {
            text-align: center;
            color: #787C7E;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .stat-box {
            background: var(--stat-bg);
            border-radius: 10px;
            padding: 15px 25px;
            text-align: center;
            min-width: 80px;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 13px;
            color: #787C7E;
            margin-top: 2px;
        }
        .dist-section {
            margin-top: 30px;
            max-width: 350px;
            margin-left: auto;
            margin-right: auto;
        }
        .dist-section h2 {
            font-size: 16px;
            text-align: center;
            margin-bottom: 12px;
            font-weight: normal;
        }
        .dist-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .dist-label {
            width: 20px;
            font-size: 14px;
            font-weight: bold;
            text-align: right;
            color: #787C7E;
        }
        .dist-bar-bg {
            flex: 1;
            height: 22px;
            background: var(--stat-bg);
            border-radius: 4px;
            overflow: hidden;
        }
        .dist-bar {
            height: 100%;
            background: #538D4E;
            border-radius: 4px;
            min-width: 22px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 6px;
            box-sizing: border-box;
            transition: width 0.3s;
        }
        .dist-bar.zero {
            background: var(--stat-bg);
            min-width: 0;
        }
        .dist-count {
            font-size: 13px;
            font-weight: bold;
            color: white;
        }
        .dist-bar.zero .dist-count {
            color: #787C7E;
        }
        .not-logged-in {
            text-align: center;
            margin-top: 30px;
            color: #787C7E;
        }
        .not-logged-in a {
            color: var(--text);
        }
        @media (max-width: 400px) {
            .stats-row { gap: 10px; }
            .stat-box { padding: 10px 15px; min-width: 60px; }
            .stat-number { font-size: 26px; }
            .dist-section { max-width: 92vw; }
        }
    </style>
    <script>
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
        window.addEventListener('message', function(e) {
            if (e.data && e.data.theme) document.documentElement.setAttribute('data-theme', e.data.theme);
        });
    </script>
</head>
<body>
    <h1>Stats</h1>
    <p id="username" class="username"></p>
    <div class="stats-row">
        <div class="stat-box">
            <div id="played" class="stat-number">-</div>
            <div class="stat-label">Played</div>
        </div>
        <div class="stat-box">
            <div id="won" class="stat-number">-</div>
            <div class="stat-label">Won</div>
        </div>
        <div class="stat-box">
            <div id="rate" class="stat-number">-</div>
            <div class="stat-label">Win %</div>
        </div>
    </div>
    <div id="dist-section" class="dist-section" style="display:none">
        <h2>Guess Distribution</h2>
        <div id="dist-bars"></div>
    </div>

    <p id="not-logged-in" class="not-logged-in" style="display:none">
        <a href="login.html">Log in</a> to track your stats
    </p>

    <script>
        (function() {
            var userData = localStorage.getItem('wordie_user');
            if (!userData) {
                document.getElementById('not-logged-in').style.display = 'block';
                return;
            }
            var user = JSON.parse(userData);

            fetch('/api/users/' + user.id).then(function(r) { return r.json(); }).then(function(data) {
                document.getElementById('username').textContent = data.username;
                document.getElementById('played').textContent = data.gamesPlayed;
                document.getElementById('won').textContent = data.gamesWon;
                var rate = data.gamesPlayed > 0
                    ? Math.round((data.gamesWon / data.gamesPlayed) * 100)
                    : 0;
                document.getElementById('rate').textContent = rate;
                return data.gamesWon;
            }).then(function(gamesWon) {
                if (gamesWon === 0) return;
                return fetch('/api/games/distribution/' + user.id).then(function(r) { return r.json(); });
            }).then(function(dist) {
                if (!dist) return;
                document.getElementById('dist-section').style.display = 'block';
                var max = 1;
                for (var k in dist) if (dist[k] > max) max = dist[k];
                var html = '';
                for (var i = 1; i <= 6; i++) {
                    var count = dist[String(i)] || 0;
                    var pct = Math.round((count / max) * 100);
                    var zero = count === 0;
                    html += '<div class="dist-row">'
                        + '<div class="dist-label">' + i + '</div>'
                        + '<div class="dist-bar-bg"><div class="dist-bar' + (zero ? ' zero' : '') + '" style="width:' + pct + '%">'
                        + '<span class="dist-count">' + count + '</span></div></div></div>';
                }
                document.getElementById('dist-bars').innerHTML = html;
            }).catch(function() {
                document.getElementById('played').textContent = '0';
                document.getElementById('won').textContent = '0';
                document.getElementById('rate').textContent = '0';
            });
        })();
    </script>
</body>
</html>
