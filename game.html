        <script>
            let win = false;
            let secretWord = "GHOST";
            let resArray = [];
            let guessNum = 0;
            let guessWord = '';
            let defLink = "https://api.dictionaryapi.dev/api/v2/entries/en/";
            let cells = [ ["r1-c1", "r1-c2","r1-c3", "r1-c4", "r1-c5"],
            ["r2-c1", "r2-c2","r2-c3", "r2-c4", "r2-c5"],
            ["r3-c1", "r3-c2","r3-c3", "r3-c4", "r3-c5"], 
            ["r4-c1", "r4-c2","r4-c3", "r4-c4", "r4-c5"],
            ["r5-c1", "r5-c2","r5-c3", "r5-c4", "r5-c5"],
            ["r6-c1", "r6-c2","r6-c3", "r6-c4", "r6-c5"] ];

            function showMenu(id)
            {
                let menScreen =  document.getElementById('menu-window');
                menScreen.src = id + '.html';
                if(menScreen.style.visibility =='hidden')
                {
                    menScreen.style.visibility ='visible'
                }
                else
                {
                   menScreen.style.visibility ='hidden'
                }
               
            }

            async function getWord()
            {
               
                 let wordRes = await fetch('https://random-word-api.herokuapp.com/word?length=5');
                 resArray = await wordRes.json();
                 secretWord = resArray[0].toUpperCase();
                 console.log(secretWord);
                 let req2 = await fetch(defLink + secretWord);
                 let helpArray = req2.json().meanings;
                 let helpDef = helpArray;
                 console.log(helpDef);
                
            }

            function addKeyBd(letter)
            {
                if(letter != "BKSP" && guessNum <= 5)
                {
                    if(guessWord.length <= 5)
                    {
                        guessWord += letter;
                    }
                    for(let i = 0; i < guessWord.length; i++)
                    {
                    let cell = document.getElementById(cells[guessNum][i]);
                    cell.textContent = guessWord.charAt(i);
                    cell.className = "guess";
                    }
                }
                else
                {
                    if(guessWord.length > 0)
                    {
                        let bksp = guessWord.length - 1;
                        let cell = document.getElementById(cells[guessNum][bksp]);
                        guessWord = guessWord.replace(guessWord.charAt(bksp),"");
                        cell.textContent = "";
                        cell.className = "";
                        
                    }
                  
                    
                }

            }

            function enterKey()
            {
                if(guessWord.length == 5 && win == false)
                {
                    let word = secretWord;
                   
                    checkEntry(word,guessWord,guessNum);
                    if(guessNum < 5)
                    {
                        guessNum++;
                        guessWord ="";
                    }
                }

            }

            function checkEntry(word,word2,num)
            {
                let chars = "";
                for(var i =  0; i < 5; i++)
                {
                    let cell = document.getElementById(cells[num][i]);
                    
                    let charCount = word.match(cell.textContent);
                    let key = document.getElementById(cell.textContent);
                    if(cell.textContent == word.charAt(i))
                    {
                        cell.className = "correct";
                        key.className = "cor";
                        chars += cell.textContent;
                    }
                   
                    else
                    {
                        for(var e = word.length; e >= 0; e--)
                        {
                            
                            if(cell.textContent == word.charAt(e))
                            {
                                chars += cell.textContent;
                                let letter = cell.textContent;
                                if(misplaced(chars,word,letter))
                                {
                                    cell.className = "misplaced";
                                    key.className = "mis";
                                   
                                }
                            
                            }
                           if(cell.className != "misplaced")
                            {
                                    cell.className = "wrong";
                                    let k = new RegExp(key.texContent,"g");
                                    console.log(k.test(word));
                                    if(k.test(word) == true)
                                    {
                                        key.className = "wro";

                                    }
                                    
                            }
                            
                        }

                       
                    }
                 
                    
                }

                if(document.getElementById(cells[num][0]).className == "correct" && document.getElementById(cells[num][1]).className == "correct"
                 && document.getElementById(cells[num][2]).className == "correct" && document.getElementById(cells[num][3]).className == "correct"
                && document.getElementById(cells[num][4]).className == "correct")
                {
                    win = true;
                    guessNum = 6;
                    alert("YOU WON!! NICE JOB!!");
                }
            }

            function misplaced(ch,wo,le){
                let reg = new RegExp(le,"g");
                let op1 = ch.match(reg);
                let op2 = wo.match(reg);

                if(op1.length <= op2.length)
                {
                        return true;
                }
                else
                {
                    return false;
                }
               
            }

        </script>
